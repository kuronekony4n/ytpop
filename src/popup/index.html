<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>YT Popup Options</title>
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      width: 250px;
      padding: 16px;
      background-color: #f1f1f1;
      color: #333;
      margin: 0;
    }
    .option {
      display: flex;
      align-items: center;
      justify-content: space-between;
      margin-bottom: 12px;
    }
    .option:last-child {
      margin-bottom: 0;
    }
    label {
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
    }
    select {
      padding: 4px 8px;
      border-radius: 6px;
      border: 1px solid #ccc;
      font-size: 13px;
      cursor: pointer;
    }
    /* Toggle switch CSS */
    .switch {
      position: relative;
      display: inline-block;
      width: 36px;
      height: 20px;
    }
    .switch input { 
      opacity: 0;
      width: 0;
      height: 0;
    }
    .slider {
      position: absolute;
      cursor: pointer;
      top: 0; left: 0; right: 0; bottom: 0;
      background-color: #ccc;
      transition: .4s;
      border-radius: 20px;
    }
    .slider:before {
      position: absolute;
      content: "";
      height: 14px;
      width: 14px;
      left: 3px;
      bottom: 3px;
      background-color: white;
      transition: .4s;
      border-radius: 50%;
    }
    input:checked + .slider {
      background-color: #ff0000;
    }
    input:checked + .slider:before {
      transform: translateX(16px);
    }
  </style>
</head>
<body>
  <div class="option">
    <label for="blurToggle">Blur Backdrop</label>
    <label class="switch">
      <input type="checkbox" id="blurToggle">
      <span class="slider"></span>
    </label>
  </div>
  <div class="option">
    <label for="popupMode">Popup Mode</label>
    <select id="popupMode">
      <option value="page">On Page</option>
      <option value="window">New Window</option>
    </select>
  </div>
  <div class="option">
    <label for="popupSize">Popup Size</label>
    <select id="popupSize">
      <option value="0.75">0.75x</option>
      <option value="1">1x</option>
      <option value="1.5">1.5x</option>
    </select>
  </div>
  <div class="option">
    <label for="miniSize">Miniplayer Size</label>
    <select id="miniSize">
      <option value="0.75">0.75x</option>
      <option value="1">1x</option>
      <option value="1.5">1.5x</option>
      <option value="2">2x</option>
      <option value="2.5">2.5x</option>
      <option value="3">3x</option>
    </select>
  </div>
  <div class="option">
    <label for="miniPos">Miniplayer Position</label>
    <select id="miniPos">
      <option value="bottom-right">Bottom Right</option>
      <option value="bottom-left">Bottom Left</option>
      <option value="top-right">Top Right</option>
      <option value="top-left">Top Left</option>
    </select>
  </div>
  <script src="popup.js" type="module"></script>
</body>
</html>
